<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>DiDi Alianza</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Hanken+Grotesk:wght@400;500;600;700&family=Noto+Sans+SC:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{--orange:#FF6A1A;--ember:#E2410B;--ink:#1A140F;--cream:#FFF4EA;--paper:#FFFFFF;--muted:#7C6F63;--line:rgba(26,20,15,.12);--ws:#1FAE54;--ok:#0F9D58;--shadow:0 14px 40px -18px rgba(226,65,11,.45);--disp:'Archivo','Noto Sans SC',sans-serif;--body:'Hanken Grotesk','Noto Sans SC',system-ui,sans-serif;}
  html[data-l="zh"]{--disp:'Noto Sans SC','Archivo',sans-serif;--body:'Noto Sans SC',system-ui,sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0}html{-webkit-text-size-adjust:100%}
  body{font-family:var(--body);background:var(--cream);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  .wrap{max-width:480px;margin:0 auto;background:var(--cream);min-height:100vh;position:relative;overflow:hidden}
  .hero{position:relative;background:var(--orange);color:#fff;padding:18px 22px 30px;overflow:hidden}
  .hero::after{content:"";position:absolute;right:-70px;top:-70px;width:230px;height:230px;border-radius:50%;background:rgba(255,255,255,.10)}
  .hero::before{content:"";position:absolute;left:-50px;bottom:-90px;width:200px;height:200px;border-radius:50%;background:var(--ember);opacity:.55}
  .topbar{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:2}
  .brand{display:flex;align-items:center;gap:8px;font-family:var(--disp);font-weight:900;font-size:19px;letter-spacing:-.5px}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:#fff;box-shadow:0 0 0 4px rgba(255,255,255,.28)}
  .lang{display:flex;gap:4px;background:rgba(0,0,0,.16);padding:3px;border-radius:999px}
  .lang button{font-family:var(--disp);font-weight:800;font-size:12px;color:rgba(255,255,255,.8);background:transparent;border:0;padding:6px 11px;border-radius:999px;cursor:pointer;transition:.15s}
  .lang button[aria-pressed="true"]{background:#fff;color:var(--ember)}
  .pill{display:inline-block;position:relative;z-index:2;margin-top:22px;font-family:var(--disp);font-weight:800;font-size:11px;letter-spacing:.14em;text-transform:uppercase;background:rgba(0,0,0,.16);padding:6px 11px;border-radius:999px}
  .h1{font-family:var(--disp);font-weight:900;font-size:38px;line-height:1.0;letter-spacing:-1.2px;margin:12px 0 0;position:relative;z-index:2}
  .h1 em{font-style:normal;display:block;color:var(--ink)}
  .sub{position:relative;z-index:2;margin-top:14px;font-size:16px;font-weight:500;max-width:340px;color:rgba(255,255,255,.95)}
  .banner{margin:16px 22px 0;background:linear-gradient(180deg,#1A140F,#2A2018);color:#fff;border-radius:18px;padding:16px 17px}
  .banner .bt{display:flex;align-items:center;gap:9px;font-family:var(--disp);font-weight:800;font-size:16px}
  .banner .bt .cal{width:26px;height:26px;flex:0 0 auto;border-radius:8px;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:15px}
  .banner .bd{font-size:13px;color:rgba(255,255,255,.78);margin:7px 0 12px}
  .mc{display:flex;flex-direction:column;gap:8px;align-items:stretch}
  .mrow{display:flex;gap:6px;flex-wrap:nowrap;align-items:center;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .mrow::-webkit-scrollbar{height:0}
  .mrow .ml{flex:0 0 auto;font-family:var(--disp);font-weight:800;font-size:12px;letter-spacing:.06em;color:var(--orange);min-width:30px}
  .mrow .d{flex:0 0 auto;font-family:var(--disp);font-weight:700;font-size:13px;min-width:30px;text-align:center;padding:6px 7px;background:rgba(255,255,255,.10);border-radius:9px}
  .mrow .wk{flex:0 0 auto;font-size:12.5px;font-weight:600;color:#fff;background:rgba(255,106,26,.24);padding:8px 13px;border-radius:9px;border:1px solid rgba(255,106,26,.55)}
  .props{padding:22px 22px 6px}
  .eyebrow{font-family:var(--disp);font-weight:800;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ember);margin-bottom:12px}
  html[data-l="zh"] .eyebrow{letter-spacing:.05em}
  .prop{display:flex;gap:13px;align-items:flex-start;background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:14px 15px;margin-bottom:11px}
  .prop .ic{flex:0 0 38px;height:38px;border-radius:11px;background:#FFEAD9;display:flex;align-items:center;justify-content:center}
  .prop .ic svg{width:20px;height:20px;stroke:var(--ember);fill:none;stroke-width:2.1;stroke-linecap:round;stroke-linejoin:round}
  .prop h3{font-family:var(--disp);font-weight:800;font-size:16px;letter-spacing:-.2px}
  .prop p{font-size:13.5px;color:var(--muted);margin-top:1px}
  .steps{padding:18px 22px 6px}
  .step{display:flex;gap:12px;align-items:center;margin-bottom:12px}
  .step .n{flex:0 0 30px;height:30px;border-radius:50%;background:var(--ink);color:#fff;font-family:var(--disp);font-weight:800;display:flex;align-items:center;justify-content:center;font-size:14px}
  .step p{font-size:14.5px;font-weight:500}.step b{font-weight:700}
  .form{padding:8px 22px 40px}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:22px;padding:20px 18px;box-shadow:var(--shadow)}
  .card h2{font-family:var(--disp);font-weight:900;font-size:22px;letter-spacing:-.6px;margin-bottom:4px}
  .card .lead{font-size:14px;color:var(--muted);margin-bottom:16px}
  label.fld{display:block;font-weight:700;font-size:13.5px;margin:14px 0 7px}
  label.fld .req{color:var(--ember)}
  .seg{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .seg button{font-family:var(--disp);font-weight:800;font-size:15px;padding:13px;border-radius:13px;border:2px solid var(--line);background:#fff;color:var(--ink);cursor:pointer;transition:.16s;letter-spacing:.2px}
  .seg button .city{display:block;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.04em;margin-top:2px}
  .seg button[aria-pressed="true"]{border-color:var(--orange);background:#FFF0E4;box-shadow:0 0 0 3px rgba(255,106,26,.16)}
  .seg button[aria-pressed="true"] .city{color:var(--ember)}
  input,select{width:100%;font-family:inherit;font-size:16px;padding:13px 14px;border:1.5px solid var(--line);border-radius:13px;background:#fff;color:var(--ink);transition:.15s}
  input:focus,select:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px rgba(255,106,26,.16)}
  select:disabled{background:#F4F0EB;color:#A99E92}
  #mapwrap{display:none;margin-top:16px}
  .mtitle{font-weight:700;font-size:13.5px;margin-bottom:7px}
  .mhint{font-size:12px;color:var(--muted);margin-top:7px}
  #mapslot{border-radius:14px;overflow:hidden;border:1.5px solid var(--line);line-height:0}
  .zmap{width:100%;display:block}
  #hotwrap{display:none;margin-top:16px}
  .hotscroll{position:relative}
  .hotrow{display:flex;gap:8px;overflow-x:auto;padding:3px 1px 6px;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
  .hotrow::-webkit-scrollbar{height:0}
  .hotscroll::after{content:"";position:absolute;top:0;right:0;height:100%;width:52px;pointer-events:none;background:linear-gradient(90deg,rgba(255,255,255,0),var(--paper) 78%);border-radius:0 12px 12px 0;opacity:1;transition:.2s}
  .cue{position:absolute;right:5px;top:calc(50% - 4px);transform:translateY(-50%);width:28px;height:28px;border-radius:50%;background:var(--orange);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--disp);font-weight:900;font-size:17px;pointer-events:none;box-shadow:0 3px 9px rgba(226,65,11,.4);animation:nudge 1.1s ease-in-out infinite;opacity:1;transition:.2s}
  @keyframes nudge{0%,100%{transform:translateY(-50%) translateX(0)}50%{transform:translateY(-50%) translateX(4px)}}
  .hotscroll.ended::after,.hotscroll.ended .cue{opacity:0}
  .chip{flex:0 0 auto;font-family:var(--disp);font-weight:700;font-size:13px;white-space:nowrap;padding:9px 13px;border-radius:999px;border:1.5px solid var(--line);background:#fff;color:var(--ink);cursor:pointer;transition:.14s}
  .chip[data-tier="0"]{border-color:#FFC9A6;background:#FFF1E8}
  .chip.on{border-color:var(--orange);background:#FFE2CE;box-shadow:0 0 0 3px rgba(255,106,26,.16)}
  .phone{display:flex;align-items:stretch}
  .phone .pre{display:flex;align-items:center;gap:5px;padding:0 12px;border:1.5px solid var(--line);border-right:0;border-radius:13px 0 0 13px;background:#F7F2EC;font-weight:700;font-size:15px;color:var(--muted);white-space:nowrap}
  .phone input{border-radius:0 13px 13px 0}.wsrow .pre{color:var(--ws)}
  .check{display:flex;align-items:center;gap:9px;margin-top:9px;font-size:13.5px;color:var(--muted);cursor:pointer}
  .check input{width:18px;height:18px;accent-color:var(--orange)}
  .intent{display:grid;gap:9px;margin-top:7px}
  .opt{display:flex;align-items:center;gap:11px;border:2px solid var(--line);border-radius:14px;padding:13px 14px;cursor:pointer;transition:.15s}
  .opt input{width:20px;height:20px;accent-color:var(--orange);flex:0 0 auto}
  .opt span{font-weight:600;font-size:14.5px}.opt small{display:block;font-weight:500;color:var(--muted);font-size:12.5px}
  .opt[data-on="true"]{border-color:var(--orange);background:#FFF0E4}
  .err{display:none;color:var(--ember);font-size:12.5px;font-weight:600;margin-top:6px}.err.show{display:block}
  .submit{width:100%;margin-top:20px;font-family:var(--disp);font-weight:900;font-size:17px;letter-spacing:.3px;color:#fff;background:var(--orange);border:0;border-radius:15px;padding:16px;cursor:pointer;transition:.16s;box-shadow:0 10px 24px -10px rgba(226,65,11,.7)}
  .submit:active{transform:scale(.985)}.submit:disabled{opacity:.6}
  .fine{font-size:11.5px;color:#A99E92;text-align:center;margin-top:14px;line-height:1.5}
  .done{display:none;text-align:center;padding:40px 26px 56px}.done.show{display:block;animation:fade .5s ease}
  .done .seal{width:78px;height:78px;border-radius:50%;background:#E6F7EC;display:flex;align-items:center;justify-content:center;margin:0 auto 18px}
  .done .seal svg{width:40px;height:40px;stroke:var(--ok);fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
  .done h2{font-family:var(--disp);font-weight:900;font-size:26px;letter-spacing:-.6px;margin-bottom:10px}
  .done p{font-size:15px;color:var(--muted);max-width:320px;margin:0 auto}
  .done .zone{display:inline-block;margin-top:16px;background:#FFF0E4;color:var(--ember);font-weight:700;font-size:13.5px;padding:9px 14px;border-radius:999px}
  .reveal{opacity:0;transform:translateY(14px);animation:fade .6s ease forwards}@keyframes fade{to{opacity:1;transform:none}}
  footer{padding:18px 22px 30px;text-align:center;font-size:11.5px;color:#B3A89C;border-top:1px solid var(--line)}
</style>
</head>

<div class="wrap">
  <header class="hero">
    <div class="topbar"><div class="brand"><span class="dot"></span>DiDi&nbsp;Alianza</div>
      <div class="lang" id="lang"><button data-lang="es" aria-pressed="true">ES</button><button data-lang="zh" aria-pressed="false">中</button></div></div>
    <span class="pill" data-k="tag"></span>
    <h1 class="h1" data-k="h1" data-html></h1>
    <p class="sub" data-k="sub"></p>
  </header>

  <section class="banner">
    <div class="bt"><span class="cal">&#128197;</span><span data-k="mday"></span></div>
    <div class="bd" data-k="mdayd"></div>
    <div class="mc" id="matchchips"></div>
  </section>

  <section class="props">
    <div class="eyebrow" data-k="why"></div>
    <div class="prop reveal" style="animation-delay:.05s"><div class="ic"><svg viewBox="0 0 24 24"><path d="M3 17l6-6 4 4 8-8"/><path d="M21 7v5"/><path d="M21 7h-5"/></svg></div><div><h3 data-k="p1t"></h3><p data-k="p1d"></p></div></div>
    <div class="prop reveal" style="animation-delay:.12s"><div class="ic"><svg viewBox="0 0 24 24"><path d="M12 1v22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div><div><h3 data-k="p2t"></h3><p data-k="p2d"></p></div></div>
    <div class="prop reveal" style="animation-delay:.19s"><div class="ic"><svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg></div><div><h3 data-k="p3t"></h3><p data-k="p3d"></p></div></div>
    <div class="prop reveal" style="animation-delay:.26s"><div class="ic"><svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 14l3-3 3 3 5-6"/></svg></div><div><h3 data-k="p4t"></h3><p data-k="p4d"></p></div></div>
  </section>

  <section class="steps">

    <div class="step reveal" style="animation-delay:.1s"><span class="n">1</span><p data-k="s1" data-html></p></div>
    <div class="step reveal" style="animation-delay:.16s"><span class="n">2</span><p data-k="s2" data-html></p></div>
    <div class="step reveal" style="animation-delay:.22s"><span class="n">3</span><p data-k="s3" data-html></p></div>
  </section>

  <section class="form">
    <div class="card" id="card">
      <h2 data-k="fh"></h2>
      <p class="lead" data-k="fl"></p>
      <label class="fld"><span data-k="lciudad"></span> <span class="req">*</span></label>
      <div class="seg" id="seg">
        <button type="button" data-city="CDMX" aria-pressed="false">CDMX<span class="city" data-k="cdmxsub"></span></button>
        <button type="button" data-city="MTY" aria-pressed="false">MTY<span class="city" data-k="mtysub"></span></button>
      </div>
      <div id="mapwrap"><div class="mtitle" data-k="mapt"></div><div id="mapslot"></div><div class="mhint" data-k="maph"></div></div>
      <div id="hotwrap"><div class="mtitle" data-k="hott"></div>
        <div class="hotscroll"><div class="hotrow" id="hotrow"></div><span class="cue">&#8250;</span></div>
        <div class="mhint" data-k="hoth"></div>
      </div>
      <label class="fld" for="zona"><span data-k="lzona"></span> <span class="req">*</span></label>
      <select id="zona" disabled></select>
      <div class="err" id="e-zona" data-k="ezona"></div>
      <label class="fld" for="nombre"><span data-k="lnombre"></span> <span class="req">*</span></label>
      <input id="nombre" type="text" autocomplete="name" data-kph="nph" />
      <div class="err" id="e-nombre" data-k="enombre"></div>
      <label class="fld" for="tel"><span data-k="ltel"></span> <span class="req">*</span></label>
      <div class="phone"><span class="pre">&#127474;&#127485; +52</span><input id="tel" type="tel" inputmode="numeric" autocomplete="tel" maxlength="10" data-kph="phd" /></div>
      <div class="err" id="e-tel" data-k="etel"></div>
      <label class="check"><input type="checkbox" id="same" /> <span data-k="same"></span></label>
      <div id="wswrap">
        <label class="fld" for="ws"><span data-k="lws"></span> <span class="req">*</span></label>
        <div class="phone wsrow"><span class="pre">&#128994; +52</span><input id="ws" type="tel" inputmode="numeric" autocomplete="tel" maxlength="10" data-kph="phd" /></div>
        <div class="err" id="e-ws" data-k="ews"></div>
      </div>
      <label class="fld"><span data-k="lint"></span> <span class="req">*</span></label>
      <div class="intent" id="intent">
        <label class="opt" data-on="false"><input type="radio" name="interes" value="si"><span><span data-k="o1"></span><small data-k="o1s"></small></span></label>
        <label class="opt" data-on="false"><input type="radio" name="interes" value="info"><span><span data-k="o2"></span><small data-k="o2s"></small></span></label>
      </div>
      <div class="err" id="e-int" data-k="eint"></div>
      <button class="submit" id="go" type="button" data-k="go"></button>
      <p class="fine" data-k="fine"></p>
    </div>
    <div class="done" id="done">
      <div class="seal"><svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg></div>
      <h2 id="done-h"></h2><p id="done-p" data-k="donep"></p><div class="zone" id="done-zone"></div>
    </div>
  </section>
  <footer data-k="footer"></footer>
</div>

const $=id=>document.getElementById(id);
const params=new URLSearchParams(location.search);
const RIDER_ID=params.get('rid')||params.get('rider_id')||'';
let city='',lang='es';
const t=k=>(I18N[lang]&&I18N[lang][k])||'';
function tier(c,id){const p=PRIORITY[c]||{};if((p.P0||[]).map(String).includes(String(id)))return 0;if((p.P1||[]).map(String).includes(String(id)))return 1;return 2;}
function fire(tr){return tr===0?'\ud83d\udd25\ud83d\udd25':tr===1?'\ud83d\udd25':'';}
function fillZones(c){const sel=$('zona'),cur=sel.value;sel.innerHTML='<option value="">'+(c?t('zph1'):t('zph0'))+'</option>';
  const list=(ZONES[c]||[]).map(z=>({...z,tr:tier(c,z.id)}));list.sort((a,b)=>a.tr-b.tr||(+a.id)-(+b.id));
  list.forEach(z=>{const o=document.createElement('option');o.value=z.id;o.dataset.name=z.name;o.dataset.tier=z.tr;const f=fire(z.tr);o.textContent=(f?f+' ':'')+t('zonepfx')+' '+z.id+' \u00b7 '+z.name;sel.appendChild(o);});
  sel.disabled=!c;if(c&&cur)sel.value=cur;}
function renderChips(c){const wrap=$('hotwrap'),row=$('hotrow');row.innerHTML='';if(!c){wrap.style.display='none';return;}
  const p=PRIORITY[c]||{};const hot=[...(p.P0||[]).map(id=>[id,0]),...(p.P1||[]).map(id=>[id,1])];
  hot.forEach(([id,tr])=>{if(!(ZONES[c]||[]).some(z=>String(z.id)===String(id)))return;
    const b=document.createElement('button');b.type='button';b.className='chip';b.dataset.tier=tr;b.dataset.zid=id;b.textContent=fire(tr)+' '+t('zonepfx')+' '+id;
    b.onclick=()=>{$('zona').value=String(id);$('zona').dispatchEvent(new Event('change'));b.scrollIntoView({inline:'center',behavior:'smooth',block:'nearest'});};row.appendChild(b);});
  wrap.style.display='block';requestAnimationFrame(updateCue);}
function updateCue(){const row=$('hotrow'),box=row.parentElement;const ended=row.scrollLeft+row.clientWidth>=row.scrollWidth-4;const noScroll=row.scrollWidth<=row.clientWidth+4;box.classList.toggle('ended',ended||noScroll);}
function markChip(id){document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',String(c.dataset.zid)===String(id)));}
function setupMap(c){const wrap=$('mapwrap'),slot=$('mapslot');if(!c){wrap.style.display='none';return;}wrap.style.display='block';
  slot.innerHTML='<img class="zmap" alt="'+t('mapt')+' '+c+'" src="'+(MAP_IMG[c]||'')+'">';}
function renderMatch(){const box=$('matchchips');box.innerHTML='';
  MATCHDAYS.forEach(g=>{const r=document.createElement('div');r.className='mrow';const l=document.createElement('span');l.className='ml';l.textContent=lang==='zh'?g.zh:g.m;r.appendChild(l);
    g.d.forEach(d=>{const s=document.createElement('span');s.className='d';s.textContent=d;r.appendChild(s);});box.appendChild(r);});
  const wr=document.createElement('div');wr.className='mrow';const w=document.createElement('span');w.className='wk';w.textContent=t('mdaywk');wr.appendChild(w);box.appendChild(wr);}
function applyLang(L){lang=L;document.documentElement.setAttribute('data-l',L);document.documentElement.lang=L==='zh'?'zh':'es-MX';document.title=t('title');
  document.querySelectorAll('[data-k]').forEach(el=>{const k=el.getAttribute('data-k');if(el.hasAttribute('data-html'))el.innerHTML=t(k);else el.textContent=t(k);});
  document.querySelectorAll('[data-kph]').forEach(el=>el.placeholder=t(el.getAttribute('data-kph')));
  [...$('lang').children].forEach(b=>b.setAttribute('aria-pressed',b.dataset.lang===L));
  renderMatch();fillZones(city);renderChips(city);setupMap(city);if(city){const cur=$('zona').value;if(cur)markChip(cur);}}
$('lang').addEventListener('click',e=>{const b=e.target.closest('button');if(b)applyLang(b.dataset.lang);});
$('seg').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;city=b.dataset.city;[...$('seg').children].forEach(x=>x.setAttribute('aria-pressed',x===b));fillZones(city);renderChips(city);setupMap(city);});
$('zona').addEventListener('change',()=>markChip($('zona').value));
$('hotrow').addEventListener('scroll',updateCue);window.addEventListener('resize',updateCue);
$('same').addEventListener('change',e=>{$('wswrap').style.display=e.target.checked?'none':'block';if(e.target.checked)$('ws').value=$('tel').value;});
$('tel').addEventListener('input',()=>{if($('same').checked)$('ws').value=$('tel').value;});
['tel','ws'].forEach(id=>$(id).addEventListener('input',e=>{e.target.value=e.target.value.replace(/\D/g,'').slice(0,10);}));
$('intent').addEventListener('change',()=>{document.querySelectorAll('.opt').forEach(o=>o.dataset.on=o.querySelector('input').checked);});
function showErr(id,on){$('e-'+id).classList.toggle('show',on);}
function validate(){let ok=true;const zona=$('zona').value;showErr('zona',!city||!zona);if(!city||!zona)ok=false;
  const nombre=$('nombre').value.trim();showErr('nombre',nombre.length<2);if(nombre.length<2)ok=false;
  const tel=$('tel').value;showErr('tel',tel.length!==10);if(tel.length!==10)ok=false;
  const ws=$('same').checked?tel:$('ws').value;showErr('ws',ws.length!==10);if(ws.length!==10)ok=false;
  const it=(document.querySelector('input[name=interes]:checked')||{}).value;showErr('int',!it);if(!it)ok=false;return ok;}
$('go').addEventListener('click',async()=>{if(!validate()){document.querySelector('.err.show')?.scrollIntoView({behavior:'smooth',block:'center'});return;}
  const zsel=$('zona').selectedOptions[0];
  const payload={rider_id:RIDER_ID,nombre:$('nombre').value.trim(),telefono:'+52'+$('tel').value,whatsapp:'+52'+($('same').checked?$('tel').value:$('ws').value),ciudad:city,zona_id:$('zona').value,zona_nombre:zsel?zsel.dataset.name:'',zona_tier:zsel?('P'+zsel.dataset.tier):'',interes:(document.querySelector('input[name=interes]:checked')||{}).value,lang:lang,campaign:CONFIG.CAMPAIGN,submitted_at:new Date().toISOString()};
  const btn=$('go');btn.disabled=true;btn.textContent=t('sending');
  const ready=CONFIG.SUPABASE_URL&&CONFIG.SUPABASE_ANON_KEY&&!CONFIG.SUPABASE_URL.includes('TU-PROYECTO');
  try{
    if(ready){
      const r=await fetch(CONFIG.SUPABASE_URL+'/rest/v1/'+CONFIG.TABLE,{method:'POST',headers:{'apikey':CONFIG.SUPABASE_ANON_KEY,'Authorization':'Bearer '+CONFIG.SUPABASE_ANON_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(payload)});
      if(!r.ok)console.error('Supabase',r.status,await r.text());
    }else{console.log('[DEMO]',payload);await new Promise(r=>setTimeout(r,400));}
    success(payload);
  }catch(e){console.error(e);success(payload);}});
function success(p){$('card').style.display='none';$('done-h').textContent=t('doneh').replace('{n}',p.nombre.split(' ')[0]);$('done-zone').textContent=p.ciudad+' \u00b7 '+t('zonepfx')+' '+p.zona_id+' \u2014 '+p.zona_nombre;$('done').classList.add('show');$('done').scrollIntoView({behavior:'smooth',block:'start'});}
const l0=(params.get('lang')||'').toLowerCase();applyLang(l0==='zh'?'zh':'es');
const c0=(params.get('c')||params.get('ciudad')||'').toUpperCase();
if(c0==='CDMX'||c0==='MTY'){const b=document.querySelector('#seg button[data-city="'+c0+'"]');if(b)b.click();}
</script>
